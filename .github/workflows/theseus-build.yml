name: ArkRinth App build
on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/theseus-build.yml
      - 'apps/app/**'
      - 'apps/app-frontend/**'
      - 'packages/app-lib/**'
      - 'packages/app-macros/**'
      - 'packages/assets/**'
      - 'packages/ui/**'
      - 'packages/utils/**'
  workflow_dispatch:
    inputs:
      sign-windows-binaries:
        description: Sign Windows binaries
        type: boolean
        default: false
        required: false
      environment:
        description: Environment
        type: choice
        options:
          - prod
          - staging
        default: prod
        required: false

permissions:
  contents: write
  packages: write
  actions: read

jobs:
  build:
    name: Build
    if: startsWith(github.event.head_commit.message, 'V')
          - name: Check commit message format
            shell: bash
            run: |
              if ! [[ "${GITHUB_HEAD_COMMIT_MESSAGE}" =~ ^V[0-9]+\.[0-9]+\.[0-9]+ ]]; then
                echo "Commit message does not match V<semver> pattern. Skipping build."
                exit 0
              fi
            env:
              GITHUB_HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest, ubuntu-latest]
        include:
          - platform: macos-latest
            artifact-target-name: universal-apple-darwin
          - platform: windows-latest
            artifact-target-name: x86_64-pc-windows-msvc
          - platform: ubuntu-latest
            artifact-target-name: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ''
          target: ${{ startsWith(matrix.platform, 'macos') && 'x86_64-apple-darwin' || '' }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Generate tauri-dev.conf.json
        shell: bash
        run: |
          GIT_HASH=$(git rev-parse --short HEAD)
          cat > apps/app/tauri-dev.conf.json <<EOF
          {
            "productName": "ArkRinth App (dev-${GIT_HASH})",
            "mainBinaryName": "ArkRinth App (dev-${GIT_HASH})",
            "identifier": "ArkRinthApp-dev-${GIT_HASH}",
            "bundle": {
              "fileAssociations": []
            }
          }
          EOF

      - name: Install Linux build dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -yq libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Dasel
        uses: jaxxstorm/action-install-gh-release@v2.1.0
        with:
          repo: TomWright/dasel
          tag: v2.8.1
          extension-matching: disable
          rename-to: ${{ startsWith(matrix.platform, 'windows') && 'dasel.exe' || 'dasel' }}
          chmod: 0755

      - name: Set application version and environment
        shell: bash
        run: |
          RAW_VERSION="$(git describe --tags --always | sed -E 's/-([0-9]+)-(g[0-9a-fA-F]+)$/-canary+\1.\2/')"
          # If git describe returned only a commit hash (no tags), use a fallback semver
          if [[ "$RAW_VERSION" =~ ^[0-9a-fA-F]+$ ]]; then
            APP_VERSION="0.0.0-canary+${RAW_VERSION}"
          else
            APP_VERSION="$RAW_VERSION"
          fi
          BUILD_ENVIRONMENT="${{ inputs.environment || 'prod' }}"
          echo "Setting application version to $APP_VERSION"
          echo "Using environment $BUILD_ENVIRONMENT"
          dasel put -f apps/app/Cargo.toml -t string -v "${APP_VERSION#v}" 'package.version'
          dasel put -f packages/app-lib/Cargo.toml -t string -v "${APP_VERSION#v}" 'package.version'
          dasel put -f apps/app-frontend/package.json -t string -v "${APP_VERSION#v}" 'version'

          cp "packages/app-lib/.env.${BUILD_ENVIRONMENT}" packages/app-lib/.env

      - name: Setup Turbo cache
        uses: rharkor/caching-for-turbo@v1.8

      - name: Install dependencies
        run: pnpm install

      - name: Set up Windows code signing
        if: startsWith(matrix.platform, 'windows')
        shell: bash
        run: |
          if [ '${{ startsWith(github.ref, 'refs/tags/v') || inputs.sign-windows-binaries }}' = 'true' ]; then
            choco install jsign --ignore-dependencies # GitHub runners come with a global Java installation already
          else
            dasel delete -f apps/app/tauri-release.conf.json 'bundle.windows.signCommand'
          fi

      - name: Build macOS app (signed)
        run: pnpm --filter=@modrinth/app run tauri build --target universal-apple-darwin --config tauri-release.conf.json
        if: startsWith(matrix.platform, 'macos') && startsWith(github.ref, 'refs/tags/v')
        env:
          ENABLE_CODE_SIGNING: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Build macOS app (unsigned)
        run: pnpm --filter=@modrinth/app run tauri build --target universal-apple-darwin --config tauri-dev.conf.json
        if: startsWith(matrix.platform, 'macos') && !startsWith(github.ref, 'refs/tags/v')

      - name: Build Linux app
        run: ${{ (startsWith(github.ref, 'refs/tags/v') && secrets.TAURI_PRIVATE_KEY) && 'pnpm --filter=@modrinth/app run tauri build --config tauri-release.conf.json' || 'pnpm --filter=@modrinth/app run tauri build --config tauri-dev.conf.json' }}
        if: startsWith(matrix.platform, 'ubuntu')
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Build Windows app
        run: |
          [System.Convert]::FromBase64String("$env:DIGICERT_ONE_SIGNER_CLIENT_CERTIFICATE_BASE64") | Set-Content -Path signer-client-cert.p12 -AsByteStream
          $env:DIGICERT_ONE_SIGNER_CREDENTIALS = "$env:DIGICERT_ONE_SIGNER_API_KEY|$PWD\signer-client-cert.p12|$env:DIGICERT_ONE_SIGNER_CLIENT_CERTIFICATE_PASSWORD"
          $env:JAVA_HOME = "$env:JAVA_HOME_17_X64"
          ${{ (startsWith(github.ref, 'refs/tags/v') && secrets.TAURI_PRIVATE_KEY) && 'pnpm --filter=@modrinth/app run tauri build --config tauri-release.conf.json --verbose --bundles "nsis,updater"' || 'pnpm --filter=@modrinth/app run tauri build --config tauri-dev.conf.json --verbose --bundles "nsis,updater"' }}
          Remove-Item -Path signer-client-cert.p12 -ErrorAction SilentlyContinue
        if: startsWith(matrix.platform, 'windows')
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          DIGICERT_ONE_SIGNER_API_KEY: ${{ secrets.DIGICERT_ONE_SIGNER_API_KEY }}
          DIGICERT_ONE_SIGNER_CLIENT_CERTIFICATE_BASE64: ${{ secrets.DIGICERT_ONE_SIGNER_CLIENT_CERTIFICATE_BASE64 }}
          DIGICERT_ONE_SIGNER_CLIENT_CERTIFICATE_PASSWORD: ${{ secrets.DIGICERT_ONE_SIGNER_CLIENT_CERTIFICATE_PASSWORD }}

      - name: Upload app bundles
        uses: actions/upload-artifact@v4
        with:
          name: App bundle (${{ matrix.artifact-target-name }})
          path: |
            target/release/bundle/appimage/ArkRinth App_*.AppImage*
            target/release/bundle/deb/ArkRinth App_*.deb*
            target/release/bundle/rpm/ArkRinth App-*.rpm*
            target/release/bundle/appimage/ArkRinth App (dev-*)_*.AppImage*
            target/release/bundle/deb/ArkRinth App (dev-*)_*.deb*
            target/release/bundle/rpm/ArkRinth App (dev-*)-*.rpm*
            target/universal-apple-darwin/release/bundle/macos/ArkRinth App.app.tar.gz*
            target/universal-apple-darwin/release/bundle/macos/ArkRinth App (dev-*)*.app.tar.gz
            target/universal-apple-darwin/release/bundle/dmg/ArkRinth App (dev-*)*.dmg
            target/universal-apple-darwin/release/bundle/dmg/ArkRinth App_*.dmg*
            target/release/bundle/nsis/ArkRinth App_*-setup.exe*
            target/release/bundle/nsis/ArkRinth App (dev-*)_*-setup.exe*
            target/release/bundle/nsis/ArkRinth App_*-setup.nsis.zip*
